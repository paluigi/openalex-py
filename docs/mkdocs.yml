site_name: openalexpy
site_description: Modern async Python library for the OpenAlex API
site_url: https://openalexpy.readthedocs.io
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Authentication & Costs: authentication.md
  - Querying: querying.md
  - Semantic Search: semantic-search.md
  - Pagination: pagination.md
  - Content Download: content-download.md
  - API Reference: api-reference.md
  - Migration from PyAlex: migration.md
